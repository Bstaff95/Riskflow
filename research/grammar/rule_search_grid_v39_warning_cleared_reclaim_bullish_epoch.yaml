model: riskflow_grammar_search_v0
families:
  - family_id: warning_cleared_viscosity_reclaim_after_damage
    direction: positive
    detector: warning_cleared_reclaim
    description: Recent warning clears, then signal reclaims viscosity with relative repair.
    parameter_grid:
      warning_lookback: [20]
      warning_context_window: [8]
      clearance_window: [5, 8]
      relative_window: [5, 8]
      min_relative_slope: [0.0, 0.03]
      trigger: [viscosity_reclaim]
      max_signal: [0.5, 1.0]
      min_recent_signal_low: [-0.5, -1.0]

  - family_id: warning_cleared_zero_reclaim_after_damage
    direction: positive
    detector: warning_cleared_reclaim
    description: Recent warning clears, then signal reclaims zero after a damaged reset.
    parameter_grid:
      warning_lookback: [20]
      warning_context_window: [8]
      clearance_window: [5, 8]
      relative_window: [5, 8]
      min_relative_slope: [0.0, 0.03]
      trigger: [zero_reclaim]
      max_signal: [0.5, 1.0]
      min_recent_signal_low: [-0.5, -1.0]
