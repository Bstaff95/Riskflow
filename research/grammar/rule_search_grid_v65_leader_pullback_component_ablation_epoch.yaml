model: riskflow_grammar_search_v0
families:
  - family_id: leader_pullback_prior_only_negative
    direction: negative
    detector: leader_pullback_component
    description: Prior leadership only, without viscosity proximity or slope-quality filters.
    parameter_grid:
      lookback: [13, 20]
      min_prior_signal: [1.0, 1.5]
      require_prior_strength: [true]
      require_near_viscosity: [false]
      require_signal_slope_floor: [false]
      require_relative_slope_floor: [false]
      warning_mode: [ignore]

  - family_id: leader_pullback_viscosity_only_negative
    direction: negative
    detector: leader_pullback_component
    description: Near-viscosity only, without prior-leader or slope-quality filters.
    parameter_grid:
      lookback: [13]
      hold_tolerance: [0.1, 0.25]
      max_pressure_distance: [0.25]
      require_prior_strength: [false]
      require_near_viscosity: [true]
      require_signal_slope_floor: [false]
      require_relative_slope_floor: [false]
      warning_mode: [ignore]

  - family_id: leader_pullback_slope_only_negative
    direction: negative
    detector: leader_pullback_component
    description: Signal and relative slope only, without prior-leader or viscosity filters.
    parameter_grid:
      lookback: [13]
      relative_window: [5]
      min_relative_slope: [0.0, 0.03]
      min_signal_slope: [-0.05, 0.0]
      require_prior_strength: [false]
      require_near_viscosity: [false]
      require_signal_slope_floor: [true]
      require_relative_slope_floor: [true]
      warning_mode: [ignore]

  - family_id: leader_pullback_prior_viscosity_negative
    direction: negative
    detector: leader_pullback_component
    description: Prior leadership plus near-viscosity pullback, without slope-quality filters.
    parameter_grid:
      lookback: [13, 20]
      min_prior_signal: [1.0, 1.5]
      hold_tolerance: [0.1, 0.25]
      max_pressure_distance: [0.25]
      require_prior_strength: [true]
      require_near_viscosity: [true]
      require_signal_slope_floor: [false]
      require_relative_slope_floor: [false]
      warning_mode: [ignore]

  - family_id: leader_pullback_prior_slope_negative
    direction: negative
    detector: leader_pullback_component
    description: Prior leadership plus slope-quality filters, without viscosity proximity.
    parameter_grid:
      lookback: [13, 20]
      relative_window: [5]
      min_prior_signal: [1.0, 1.5]
      min_relative_slope: [0.0, 0.03]
      min_signal_slope: [-0.05, 0.0]
      require_prior_strength: [true]
      require_near_viscosity: [false]
      require_signal_slope_floor: [true]
      require_relative_slope_floor: [true]
      warning_mode: [ignore]

  - family_id: leader_pullback_viscosity_slope_negative
    direction: negative
    detector: leader_pullback_component
    description: Near-viscosity plus slope-quality filters, without prior-leader requirement.
    parameter_grid:
      lookback: [13]
      relative_window: [5]
      hold_tolerance: [0.1, 0.25]
      max_pressure_distance: [0.25]
      min_relative_slope: [0.0, 0.03]
      min_signal_slope: [-0.05, 0.0]
      require_prior_strength: [false]
      require_near_viscosity: [true]
      require_signal_slope_floor: [true]
      require_relative_slope_floor: [true]
      warning_mode: [ignore]

  - family_id: leader_pullback_full_parent_negative
    direction: negative
    detector: leader_pullback_component
    description: Full parent signal requiring prior leadership, near-viscosity, and slope-quality filters.
    parameter_grid:
      lookback: [13, 20]
      relative_window: [5]
      min_prior_signal: [1.0, 1.5]
      hold_tolerance: [0.1, 0.25]
      max_pressure_distance: [0.25]
      min_relative_slope: [0.0, 0.03]
      min_signal_slope: [-0.05, 0.0]
      require_prior_strength: [true]
      require_near_viscosity: [true]
      require_signal_slope_floor: [true]
      require_relative_slope_floor: [true]
      warning_mode: [ignore]
