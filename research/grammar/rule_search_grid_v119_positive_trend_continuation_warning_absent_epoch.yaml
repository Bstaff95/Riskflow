model: riskflow_grammar_search_v0
families:
- family_id: positive_trend_continuation_warning_absent_path
  direction: positive
  detector: trend_continuation_no_warning
  description: Warning-absent continuation test for coins already above viscosity
    but not yet overextended.
  parameter_grid:
    window:
    - 10
    - 13
    relative_window:
    - 5
    gradient_window:
    - 5
    min_signal:
    - 0.0
    max_signal:
    - 1.0
    min_time_above:
    - 0.55
    - 0.65
    min_relative_slope:
    - 0.02
    - 0.04
    min_gradient_slope:
    - 0.0
    max_pressure_distance:
    - 0.35
    - 0.6
    warning_mode:
    - absent
    warning_lookback:
    - 20
    warning_context_window:
    - 8
