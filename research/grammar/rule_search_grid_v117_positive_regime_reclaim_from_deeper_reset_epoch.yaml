model: riskflow_grammar_search_v0
families:
- family_id: positive_regime_reclaim_from_deeper_reset
  direction: positive
  detector: regime_confirmed_reclaim
  description: Positive reclaim only after a deeper recent signal low, testing whether
    reset depth improves follow-through.
  parameter_grid:
    relative_window:
    - 5
    - 8
    benchmark_window:
    - 5
    min_relative_slope:
    - 0.04
    - 0.05
    min_benchmark_return:
    - 0.0
    - 0.02
    trigger:
    - viscosity_reclaim
    require_warning_absent:
    - true
    max_signal:
    - 1.0
    min_compression:
    - 30.0
    - 40.0
    min_recent_signal_low:
    - -2.0
    - -1.5
    - -1.0
    warning_lookback:
    - 20
    warning_context_window:
    - 8
