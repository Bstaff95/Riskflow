model: riskflow_grammar_search_v0
families:
  - family_id: positive_post_underperformance_rotation_permission
    direction: positive
    detector: rotation_reclaim_setup
    description: Prior underperformer repairs signal and relative strength before reclaim.
    parameter_grid:
      setup_mode: [post_underperformance]
      lookback: [20, 34]
      relative_window: [5, 8]
      trigger: [viscosity_reclaim]
      min_relative_slope: [0.02, 0.04]
      min_signal_slope: [0.0]
      min_gradient_slope: [0.0]
      min_prior_relative_return: [-0.3, -0.2]
      min_signal_repair: [0.15, 0.3]
      max_signal: [1.0]
      exclude_late_leader_pullback: [true]
