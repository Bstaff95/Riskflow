model: riskflow_grammar_search_v0
families:
  - family_id: lower_high_rollover_daily_epoch
    direction: negative
    detector: lower_high_rollover
    description: Dedicated lower-high rollover rerun after epoch-1 confirmation of warning-side edge.
    parameter_grid:
      lookback: [13, 20]
      recent_window: [5, 8]
      min_prior_high: [1.0, 1.5, 2.0]
      min_lower_high_gap: [0.15, 0.25, 0.4]
      require_below_viscosity: [false, true]
      max_relative_slope: [-0.05, 0.0]

  - family_id: lower_high_rollover_pressure_filtered_epoch
    direction: negative
    detector: lower_high_rollover
    description: Lower-high rollover with pressure/viscosity filters to test false-positive reduction.
    parameter_grid:
      lookback: [13, 20]
      recent_window: [5]
      min_prior_high: [1.5, 2.0]
      min_lower_high_gap: [0.2, 0.35]
      require_below_viscosity: [true]
      max_relative_slope: [-0.05, 0.0]
      max_pressure_area_balance: [0.0, 5.0]
      max_time_above_viscosity_10: [5.0, 10.0]
