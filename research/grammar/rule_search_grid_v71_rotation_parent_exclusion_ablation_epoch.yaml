model: riskflow_grammar_search_v0
families:
  - family_id: post_underperformance_parent_exclusion_ablation
    direction: positive
    detector: rotation_reclaim_setup
    description: Tests whether excluding the validated late-leader pullback parent improves rotation reclaim quality.
    parameter_grid:
      setup_mode: [post_underperformance]
      lookback: [20, 30]
      relative_window: [5]
      trigger: [viscosity_reclaim, zero_reclaim]
      min_prior_relative_return: [-0.3]
      min_signal_repair: [0.1]
      max_signal: [1.0]
      min_relative_slope: [0.0, 0.03]
      min_signal_slope: [-0.02]
      min_gradient_slope: [-0.05]
      exclude_late_leader_pullback: [true, false]
      parent_context_window: [20]

  - family_id: fresh_base_parent_exclusion_ablation
    direction: positive
    detector: rotation_reclaim_setup
    description: Tests whether excluding late-leader pullback risk improves fresh base reclaim quality.
    parameter_grid:
      setup_mode: [fresh_base_reclaim]
      lookback: [13, 20]
      relative_window: [5]
      trigger: [viscosity_reclaim, zero_reclaim]
      max_prior_signal: [1.0]
      max_signal: [1.0]
      min_compression: [40.0]
      min_relative_slope: [0.0, 0.03]
      min_signal_slope: [-0.02]
      min_gradient_slope: [-0.05]
      exclude_late_leader_pullback: [true, false]
      parent_context_window: [20]
