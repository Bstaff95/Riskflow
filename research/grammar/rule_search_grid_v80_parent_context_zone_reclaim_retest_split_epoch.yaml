model: riskflow_grammar_search_v0
families:
  - family_id: parent_active_zone_reclaim_retest_blocker
    direction: negative
    detector: parent_context_bullish_setup
    description: Zone reclaim/retest while the leader-pullback no-chase parent is active.
    parameter_grid:
      setup: [zone_reclaim_retest]
      parent_mode: [active]
      level: [-1.5, 0.0]
      tolerance: [0.15, 0.3]
      hold_bars: [3, 5]
      lookback: [20]
      parent_context_window: [20]
      parent_lookback: [20]
      parent_relative_window: [5]
      parent_min_prior_signal: [1.0, 1.5]
      parent_hold_tolerance: [0.25]
      parent_max_pressure_distance: [0.25]
      parent_min_relative_slope: [0.0]
      parent_min_signal_slope: [-0.05]

  - family_id: parent_absent_zone_reclaim_retest_allowed
    direction: positive
    detector: parent_context_bullish_setup
    description: Zone reclaim/retest only when the leader-pullback no-chase parent is absent.
    parameter_grid:
      setup: [zone_reclaim_retest]
      parent_mode: [absent]
      level: [-1.5, 0.0]
      tolerance: [0.15, 0.3]
      hold_bars: [3, 5]
      lookback: [20]
      parent_context_window: [20]
      parent_lookback: [20]
      parent_relative_window: [5]
      parent_min_prior_signal: [1.0, 1.5]
      parent_hold_tolerance: [0.25]
      parent_max_pressure_distance: [0.25]
      parent_min_relative_slope: [0.0]
      parent_min_signal_slope: [-0.05]

  - family_id: parent_ignore_zone_reclaim_retest_baseline
    direction: positive
    detector: parent_context_bullish_setup
    description: Zone reclaim/retest baseline without parent no-chase gating.
    parameter_grid:
      setup: [zone_reclaim_retest]
      parent_mode: [ignore]
      level: [-1.5, 0.0]
      tolerance: [0.15, 0.3]
      hold_bars: [3, 5]
      lookback: [20]
      parent_context_window: [20]
      parent_lookback: [20]
      parent_relative_window: [5]
      parent_min_prior_signal: [1.0, 1.5]
      parent_hold_tolerance: [0.25]
      parent_max_pressure_distance: [0.25]
      parent_min_relative_slope: [0.0]
      parent_min_signal_slope: [-0.05]
