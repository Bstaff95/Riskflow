model: riskflow_grammar_search_v0
families:
  - family_id: quiet_pressure_acceptance
    direction: positive
    detector: pressure_acceptance
    description: Quiet pressure acceptance before obvious extension.
    parameter_grid:
      window: [10, 20]
      min_time_above: [0.5, 0.65]
      min_balance: [0.0, 1.0]
      min_delta: [0.0, 0.5]
      zone_max: [0.5, 1.0]

  - family_id: clean_chop_reclaim_accumulation
    direction: positive
    detector: chop_quality
    description: Clean compression quality followed by reclaim.
    parameter_grid:
      chop_type: [clean]
      min_quality: [0.55, 0.65]
      trigger: [viscosity_reclaim, zero_reclaim]
      recent_window: [8, 13]

  - family_id: curvature_from_low_zone_accumulation
    direction: positive
    detector: curvature_from_low_zone
    description: Early curvature from a low zone before signal turns extended.
    parameter_grid:
      zone_max: [-1.0, -1.5]
      slope_window: [3, 5]
      accel_min: [0.0, 0.02]
      confirm_below: [0.0, 0.5]
