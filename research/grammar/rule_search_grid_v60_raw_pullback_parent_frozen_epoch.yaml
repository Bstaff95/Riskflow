model: riskflow_grammar_search_v0
families:
  - family_id: raw_pullback_parent_frozen
    direction: negative
    detector: trend_pullback_hold
    description: "Frozen parent no-chase signal after loops 56-75: leader pullback near viscosity without warning gating."
    parameter_grid:
      lookback: [13, 20]
      relative_window: [5]
      min_prior_signal: [1.0, 1.5]
      hold_tolerance: [0.1, 0.25]
      max_pressure_distance: [0.25]
      min_relative_slope: [0.0, 0.03]
      min_signal_slope: [-0.05]
      warning_mode: [ignore]
