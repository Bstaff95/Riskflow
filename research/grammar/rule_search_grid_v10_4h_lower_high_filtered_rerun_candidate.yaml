model: riskflow_grammar_search_v0
families:
  - family_id: four_hour_lower_high_filtered_rerun
    direction: negative
    detector: lower_high_rollover
    description: Tiny fresh-data rerun grid for the filtered 4h lower-high warning shape suggested by v9.
    parameter_grid:
      lookback: [13, 20]
      recent_window: [5]
      min_prior_high: [1.5]
      min_lower_high_gap: [0.15, 0.25, 0.50]
      require_below_viscosity: [true]
      max_relative_slope: [0.0, 0.05]
      min_fast_slow_pressure_gap: [-0.32]
      max_pressure_distance: [-0.50]
