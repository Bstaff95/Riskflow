    detector: warning_absent_bullish_setup
    description: Failed low-zone breakdown reclaim with warning context absent or cleared.
    parameter_grid:
      setup: [failed_weakness_reclaim]
      warning_mode: [absent, cleared]
      lookback: [13, 20]
      zone_max: [-1.5, -1.0]
      low_tolerance: [0.25]
      min_slope: [0.0]
      relative_slope_min: [0.0, 0.03]
      recent_window: [8]
      trigger: [viscosity_reclaim, zero_reclaim]
      warning_lookback: [20]
      warning_context_window: [8]
