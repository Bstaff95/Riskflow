model: riskflow_grammar_search_v0
families:
  - family_id: compression_warning_cleared_failed_weakness_recovery
    direction: positive
    detector: compression_warning_bullish_setup
    description: Failed-weakness reclaim after compression warning clears.
    parameter_grid:
      setup: [failed_weakness_reclaim]
      warning_mode: [cleared]
      lookback: [13, 20]
      zone_max: [-2.0, -1.5]
      low_tolerance: [0.2, 0.35]
      min_slope: [0.0]
      relative_slope_min: [-0.05]
      recent_window: [8]
      trigger: [viscosity_reclaim]
      warning_context_window: [20]
      warning_min_compression: [70.0]
      warning_trigger: [viscosity_reclaim]
      warning_relative_window: [8]
      warning_min_relative_slope: [-0.02]

  - family_id: compression_warning_cleared_zone_recovery
    direction: positive
    detector: compression_warning_bullish_setup
    description: Zone reclaim/retest after compression warning clears.
    parameter_grid:
      setup: [zone_reclaim_retest]
      warning_mode: [cleared]
      level: [-1.5, 0.0]
      tolerance: [0.15, 0.3]
      hold_bars: [3, 5]
      lookback: [20]
      warning_context_window: [20]
      warning_min_compression: [70.0]
      warning_trigger: [viscosity_reclaim]
      warning_relative_window: [8]
      warning_min_relative_slope: [-0.02]

  - family_id: compression_warning_cleared_reclaim_recovery
    direction: positive
    detector: compression_warning_bullish_setup
    description: Lower-threshold compression reclaim after compression warning clears.
    parameter_grid:
      setup: [compression_reclaim]
      warning_mode: [cleared]
      min_compression: [40.0, 55.0]
      trigger: [viscosity_reclaim]
      relative_window: [8]
      min_relative_slope: [-0.02]
      lookback: [20]
      warning_context_window: [20]
      warning_min_compression: [70.0]
      warning_trigger: [viscosity_reclaim]
      warning_relative_window: [8]
      warning_min_relative_slope: [-0.02]
