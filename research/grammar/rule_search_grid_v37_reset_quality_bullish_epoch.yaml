model: riskflow_grammar_search_v0
families:
  - family_id: post_reset_reclaim_quality
    direction: positive
    detector: post_reset_reclaim
    description: Hot leader reset followed by reclaim and relative repair.
    parameter_grid:
      prior_window: [20, 30]
      hot_level: [1.0, 1.5]
      reset_level: [0.5, 1.0]
      reset_window: [8, 13]
      require_below_viscosity: [true]
      trigger: [viscosity_reclaim, zero_reclaim]
      relative_slope_min: [-0.02, 0.02]

  - family_id: low_zone_coil_reclaim_quality
    direction: positive
    detector: low_zone_coil_reclaim
    description: Low-zone coil that reclaims after controlled compression.
    parameter_grid:
      coil_window: [12, 20]
      range_max: [0.7, 1.0]
      std_max: [0.35, 0.5]
      zone_max: [-1.0, -1.5]
      recent_window: [8]
      trigger: [viscosity_reclaim]

  - family_id: chaotic_chop_resolution_quality
    direction: positive
    detector: chaotic_chop_resolution
    description: Chaotic reset resolving into reclaim after compression rebuilds.
    parameter_grid:
      recent_window: [8, 13]
      max_chop_compression: [60.0, 70.0]
      min_current_compression: [50.0, 60.0]
      trigger: [viscosity_reclaim, zero_reclaim]
