model: riskflow_grammar_search_v0
families:
  - family_id: warning_absent_failed_weakness_reclaim
    direction: positive
    detector: warning_absent_bullish_setup
    description: Failed weakness reclaim only when recent failed-breakout/lower-high warning context is absent.
    parameter_grid:
      setup: [failed_weakness_reclaim]
      lookback: [13, 20]
      zone_max: [-2.0, -1.5]
      low_tolerance: [0.2, 0.35]
      min_slope: [-0.02, 0.03]
      relative_slope_min: [-0.05, 0.0]
      recent_window: [8]
      trigger: [viscosity_reclaim, zero_reclaim]
      warning_context_window: [5, 8]
      warning_lookback: [20]

  - family_id: warning_absent_compression_reclaim
    direction: positive
    detector: warning_absent_bullish_setup
    description: Compression reclaim only when recent warning context is absent.
    parameter_grid:
      setup: [compression_reclaim]
      min_compression: [55.0, 70.0]
      trigger: [viscosity_reclaim, zero_reclaim]
      relative_window: [5, 8]
      min_relative_slope: [-0.02, 0.02]
      lookback: [20]
      warning_context_window: [5, 8]

  - family_id: warning_absent_reclaim_retest_hold
    direction: positive
    detector: warning_absent_bullish_setup
    description: Reclaim-retest-hold only when recent warning context is absent.
    parameter_grid:
      setup: [zone_reclaim_retest]
      level: [-1.5, 0.0]
      tolerance: [0.15, 0.3]
      hold_bars: [3, 5]
      lookback: [20]
      warning_context_window: [5, 8]
