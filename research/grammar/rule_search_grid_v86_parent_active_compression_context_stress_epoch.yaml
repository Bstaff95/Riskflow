model: riskflow_grammar_search_v0
families:
  - family_id: parent_active_compression_context_stress
    direction: negative
    detector: parent_context_bullish_setup
    description: Stress parent prior-strength threshold and context window for active compression reclaim blocker.
    parameter_grid:
      setup: [compression_reclaim]
      parent_mode: [active]
      min_compression: [55.0]
      trigger: [viscosity_reclaim]
      relative_window: [5, 8]
      min_relative_slope: [-0.02]
      lookback: [20]
      parent_context_window: [10, 20, 30]
      parent_lookback: [20]
      parent_relative_window: [5]
      parent_min_prior_signal: [1.0, 1.5, 2.0]
      parent_hold_tolerance: [0.25, 0.5]
      parent_max_pressure_distance: [0.25]
      parent_min_relative_slope: [0.0]
      parent_min_signal_slope: [-0.05]
