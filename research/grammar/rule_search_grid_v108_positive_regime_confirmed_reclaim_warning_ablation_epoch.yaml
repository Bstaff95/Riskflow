model: riskflow_grammar_search_v0
families:
  - family_id: positive_regime_confirmed_reclaim_warning_ablation_positive
    direction: positive
    detector: regime_confirmed_reclaim
    description: Regime-confirmed reclaim without warning filter, positive ablation.
    parameter_grid:
      relative_window: [5]
      benchmark_window: [5]
      min_relative_slope: [0.05]
      min_benchmark_return: [0.0, 0.02]
      trigger: [viscosity_reclaim]
      require_warning_absent: [false]
      max_signal: [1.0]
      min_compression: [40.0]

  - family_id: positive_regime_confirmed_reclaim_warning_ablation_negative
    direction: negative
    detector: regime_confirmed_reclaim
    description: Regime-confirmed reclaim without warning filter, negative ablation.
    parameter_grid:
      relative_window: [5]
      benchmark_window: [5]
      min_relative_slope: [0.05]
      min_benchmark_return: [0.0, 0.02]
      trigger: [viscosity_reclaim]
      require_warning_absent: [false]
      max_signal: [1.0]
      min_compression: [40.0]
