model: riskflow_grammar_search_v0
families:
  - family_id: low_zone_coil_base_reclaim
    direction: positive
    detector: low_zone_coil_reclaim
    description: Low-zone coil reclaim as a fresh base expansion candidate.
    parameter_grid:
      coil_window: [10, 14]
      range_max: [0.6, 0.8]
      std_max: [0.25, 0.35]
      zone_max: [-1.5, -1.0]
      recent_window: [8]
      trigger: [viscosity_reclaim, zero_reclaim]

  - family_id: curvature_low_zone_base_expansion
    direction: positive
    detector: curvature_from_low_zone
    description: Curvature turn from low zone before obvious trend extension.
    parameter_grid:
      zone_max: [-1.5, -1.0]
      slope_window: [3, 5]
      accel_min: [0.0, 0.03]
