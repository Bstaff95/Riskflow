model: riskflow_grammar_search_v0
families:
  - family_id: raw_balanced_trend_continuation_baseline
    direction: positive
    detector: trend_continuation_no_warning
    description: Raw trend continuation baseline without warning filtering.
    parameter_grid:
      window: [10, 20]
      relative_window: [5]
      gradient_window: [5]
      min_signal: [0.5]
      max_signal: [1.5]
      min_time_above: [0.6]
      min_relative_slope: [0.0, 0.03]
      min_gradient_slope: [0.0, 0.03]
      warning_mode: [ignore]

  - family_id: raw_trend_pullback_hold_baseline
    direction: positive
    detector: trend_pullback_hold
    description: Raw trend pullback-hold baseline without warning filtering.
    parameter_grid:
      lookback: [13, 20]
      relative_window: [5]
      min_prior_signal: [1.0, 1.5]
      hold_tolerance: [0.1, 0.25]
      max_pressure_distance: [0.25, 0.5]
      min_relative_slope: [0.0, 0.03]
      min_signal_slope: [-0.05]
      warning_mode: [ignore]
