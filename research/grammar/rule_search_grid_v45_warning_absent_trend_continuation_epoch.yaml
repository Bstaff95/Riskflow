model: riskflow_grammar_search_v0
families:
  - family_id: warning_absent_balanced_trend_continuation
    direction: positive
    detector: trend_continuation_no_warning
    description: Trend continuation while warning context is absent.
    parameter_grid:
      window: [10, 20]
      relative_window: [5]
      gradient_window: [5]
      min_signal: [0.5]
      max_signal: [1.5]
      min_time_above: [0.6]
      min_relative_slope: [0.0, 0.03]
      min_gradient_slope: [0.0, 0.03]
      warning_mode: [absent]
      warning_lookback: [20]
      warning_context_window: [8]

  - family_id: warning_absent_early_trend_continuation
    direction: positive
    detector: trend_continuation_no_warning
    description: Earlier trend continuation before extension while warning context is absent.
    parameter_grid:
      window: [8, 13]
      relative_window: [5]
      gradient_window: [3]
      min_signal: [0.0]
      max_signal: [1.0]
      min_time_above: [0.5]
      min_relative_slope: [0.03]
      min_gradient_slope: [0.0]
      warning_mode: [absent]
      warning_lookback: [20]
      warning_context_window: [8]
