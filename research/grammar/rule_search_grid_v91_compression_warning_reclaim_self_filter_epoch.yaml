model: riskflow_grammar_search_v0
families:
  - family_id: compression_warning_active_reclaim_self_blocker
    direction: negative
    detector: compression_warning_bullish_setup
    description: Lower-threshold compression reclaim while strict compression-reclaim warning is active.
    parameter_grid:
      setup: [compression_reclaim]
      warning_mode: [active]
      min_compression: [40.0, 55.0]
      trigger: [viscosity_reclaim]
      relative_window: [5, 8]
      min_relative_slope: [-0.02, 0.02]
      lookback: [20]
      warning_context_window: [20]
      warning_min_compression: [70.0]
      warning_trigger: [viscosity_reclaim]
      warning_relative_window: [8]
      warning_min_relative_slope: [-0.02]

  - family_id: compression_warning_absent_reclaim_self_allowed
    direction: positive
    detector: compression_warning_bullish_setup
    description: Lower-threshold compression reclaim when strict compression-reclaim warning is absent.
    parameter_grid:
      setup: [compression_reclaim]
      warning_mode: [absent]
      min_compression: [40.0, 55.0]
      trigger: [viscosity_reclaim]
      relative_window: [5, 8]
      min_relative_slope: [-0.02, 0.02]
      lookback: [20]
      warning_context_window: [20]
      warning_min_compression: [70.0]
      warning_trigger: [viscosity_reclaim]
      warning_relative_window: [8]
      warning_min_relative_slope: [-0.02]

  - family_id: compression_warning_cleared_reclaim_self_reset
    direction: positive
    detector: compression_warning_bullish_setup
    description: Lower-threshold compression reclaim after strict compression-reclaim warning clears.
    parameter_grid:
      setup: [compression_reclaim]
      warning_mode: [cleared]
      min_compression: [40.0, 55.0]
      trigger: [viscosity_reclaim]
      relative_window: [5, 8]
      min_relative_slope: [-0.02, 0.02]
      lookback: [20]
      warning_context_window: [20]
      warning_min_compression: [70.0]
      warning_trigger: [viscosity_reclaim]
      warning_relative_window: [8]
      warning_min_relative_slope: [-0.02]
