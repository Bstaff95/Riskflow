model: riskflow_grammar_search_v0
families:
  - family_id: clean_chop_reclaim
    direction: positive
    detector: chop_quality
    description: Clean chop quality followed by viscosity or zero reclaim.
    parameter_grid:
      chop_type: [clean]
      min_quality: [0.5, 0.65]
      recent_window: [8, 13]
      trigger: [viscosity_reclaim, zero_reclaim]
