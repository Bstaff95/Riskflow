model: riskflow_grammar_search_v0
families:
  - family_id: early_repair_low_zone_proxy
    direction: positive
    detector: curvature_from_low_zone
    description: Single-timeframe proxy for early lower-timeframe repair before full higher-timeframe confirmation.
    parameter_grid:
      zone_max: [-2.0, -1.5]
      slope_window: [3, 5]
      accel_min: [0.0, 0.03]
      confirm_below: [-0.5, 0.0]

  - family_id: low_zone_coil_reclaim_proxy
    direction: positive
    detector: low_zone_coil_reclaim
    description: Coiled low-zone repair proxy for later MTF sequence work.
    parameter_grid:
      coil_window: [8, 13]
      range_max: [0.5, 0.8]
      std_max: [0.25, 0.4]
      zone_max: [-2.0, -1.5]
      recent_window: [8]
      trigger: [viscosity_reclaim, zero_reclaim]
