model: riskflow_grammar_search_v0
families:
  - family_id: warning_repaired_pullback_hold
    direction: positive
    detector: trend_pullback_hold
    description: Pullback hold after warning repair with positive relative repair.
    parameter_grid:
      lookback: [13, 20]
      relative_window: [5]
      min_prior_signal: [1.0, 1.5]
      hold_tolerance: [0.1, 0.25]
      max_pressure_distance: [0.25, 0.35]
      min_relative_slope: [0.03]
      min_signal_slope: [-0.05, 0.0]
      warning_mode: [cleared]
      warning_lookback: [20]
      warning_context_window: [8, 13]

  - family_id: warning_repaired_reclaim
    direction: positive
    detector: warning_cleared_reclaim
    description: Warning clears, signal reclaims, and relative pressure repairs.
    parameter_grid:
      warning_lookback: [20]
      warning_context_window: [8, 13]
      clearance_window: [8, 13]
      relative_window: [5]
      min_relative_slope: [0.03]
      trigger: [viscosity_reclaim, zero_reclaim]
      max_signal: [1.0, 1.5]
      min_recent_signal_low: [-1.5, -1.0]
