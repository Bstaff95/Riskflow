model: riskflow_grammar_search_v0
families:
  - family_id: warning_absent_compression_reclaim_followup
    direction: positive
    detector: warning_absent_bullish_setup
    description: Epoch 2 split follow-up for 1d compression reclaim when warning context is absent.
    parameter_grid:
      setup: [compression_reclaim]
      min_compression: [50.0, 55.0, 65.0]
      trigger: [viscosity_reclaim, zero_reclaim]
      relative_window: [5, 8, 13]
      min_relative_slope: [0.0, 0.02, 0.04]
      lookback: [20]
      warning_context_window: [5, 8]

  - family_id: compression_reclaim_no_filter_baseline
    direction: positive
    detector: compression_reclaim
    description: Baseline compression reclaim without warning-absent filtering.
    parameter_grid:
      min_compression: [50.0, 55.0, 65.0]
      trigger: [viscosity_reclaim, zero_reclaim]
