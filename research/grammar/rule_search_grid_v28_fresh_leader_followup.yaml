model: riskflow_grammar_search_v0
families:
  - family_id: fresh_leader_ignition_12h_followup
    direction: positive
    detector: fresh_leader_ignition
    description: Epoch 2 follow-up focused on 12h fresh-leader ignition with stricter relative and gradient improvement.
    parameter_grid:
      relative_window: [5, 8]
      min_relative_slope: [0.03, 0.05, 0.08]
      max_signal: [0.5, 0.75]
      min_gradient_slope: [0.03, 0.06]
      price_lookback: [13, 20]
      below_high_margin: [0.02, 0.04]
      trigger: [viscosity_reclaim]

  - family_id: fresh_leader_zero_reclaim_baseline
    direction: positive
    detector: fresh_leader_ignition
    description: Baseline fresh-leader zero reclaim to compare against viscosity reclaim.
    parameter_grid:
      relative_window: [5, 8]
      min_relative_slope: [0.03, 0.05]
      max_signal: [0.75, 1.0]
      min_gradient_slope: [0.0, 0.03]
      price_lookback: [13, 20]
      below_high_margin: [0.0, 0.02]
      trigger: [zero_reclaim]
