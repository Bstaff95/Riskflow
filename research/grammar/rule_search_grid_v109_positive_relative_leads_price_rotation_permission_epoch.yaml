model: riskflow_grammar_search_v0
families:
  - family_id: positive_relative_leads_price_rotation_permission
    direction: positive
    detector: rotation_reclaim_setup
    description: Relative strength leads price before extension, then viscosity reclaim.
    parameter_grid:
      setup_mode: [relative_leads_price]
      lookback: [20, 34]
      relative_window: [5, 8]
      trigger: [viscosity_reclaim]
      min_relative_slope: [0.02, 0.04]
      min_signal_slope: [0.0]
      min_gradient_slope: [0.0]
      max_price_return: [0.1, 0.2]
      min_relative_return: [0.05, 0.1]
      below_high_margin: [0.02]
      exclude_late_leader_pullback: [true]
